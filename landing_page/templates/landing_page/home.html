<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Buddy - Shared payments, fully assured</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #0a9c6c;
            --emerald-dark: #077353;
            --ink: #1f2a37;
            --muted: #4b5563;
            --surface: #f4f7f4;
            --pill: #e6f5ef;
            --line: rgba(15, 23, 42, 0.08);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "DM Sans", "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 10% 10%, #f3f9f7 0%, #eef4f2 35%, #f7f9f7 100%);
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .page {
            min-height: 100vh;
        }
        .container {
            width: min(1120px, 92vw);
            margin: 0 auto;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--line);
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: "Space Grotesk", "DM Sans", sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .logo-mark {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: #e9f7f0;
            color: var(--emerald);
            border: 1px solid rgba(10, 156, 108, 0.2);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            font-weight: 500;
            color: #354253;
        }
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 500;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 999px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn-primary {
            background: var(--emerald);
            color: white;
            box-shadow: 0 10px 24px rgba(10, 156, 108, 0.25);
        }
        .btn-primary:hover {
            background: var(--emerald-dark);
            transform: translateY(-1px);
        }
        .btn-secondary {
            border: 1px solid #c9d3d0;
            color: #1f2937;
            background: #f8faf9;
        }
        .hero {
            position: relative;
            padding: 96px 0 120px;
            overflow: hidden;
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.8), rgba(216, 233, 227, 0.6), rgba(255, 255, 255, 0.6));
            z-index: 0;
        }
        .hero-art {
            position: absolute;
            inset: -10% -20% 0 30%;
            background:
                linear-gradient(120deg, rgba(148, 163, 184, 0.12) 0%, rgba(148, 163, 184, 0.18) 45%, rgba(148, 163, 184, 0.1) 100%),
                repeating-linear-gradient(135deg, rgba(15, 23, 42, 0.08) 0 2px, transparent 2px 90px);
            clip-path: polygon(0 10%, 100% 0, 100% 90%, 0 100%);
            border-left: 1px solid rgba(15, 23, 42, 0.08);
            z-index: 0;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 760px;
            margin: 0 auto;
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            background: var(--pill);
            color: var(--emerald);
            font-weight: 600;
            border: 1px solid rgba(10, 156, 108, 0.2);
            font-size: 14px;
        }
        .pill-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--emerald);
        }
        h1 {
            font-family: "Space Grotesk", "DM Sans", sans-serif;
            font-weight: 700;
            font-size: clamp(2.8rem, 6vw, 4.4rem);
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin: 28px 0 18px;
        }
        h1 span {
            color: var(--emerald);
        }
        .hero p {
            font-size: 18px;
            line-height: 1.7;
            color: var(--muted);
            margin: 0 auto 32px;
            max-width: 560px;
        }
        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .section-divider {
            height: 24px;
            background: linear-gradient(90deg, rgba(10, 156, 108, 0.12), rgba(10, 156, 108, 0));
        }
        @media (max-width: 840px) {
            .nav-links {
                display: none;
            }
            .hero {
                padding: 72px 0 96px;
            }
            .hero-actions {
                flex-direction: column;
            }
        }
        @media (max-width: 520px) {
            .nav-cta {
                gap: 10px;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="container nav">
                <div class="logo">
                    <span class="logo-mark" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M12 3L5 6V12C5 16.97 8.438 21.18 12 22C15.562 21.18 19 16.97 19 12V6L12 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                            <path d="M9.5 12.5L11.2 14.2L14.8 10.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    Balance Buddy
                </div>
                <nav class="nav-links">
                    <a href="#">Features</a>
                    <a href="#">How it works</a>
                    <a href="#">Log in</a>
                </nav>
                <div class="nav-cta">
                    <a href="#" class="btn btn-primary">Get Started</a>
                </div>
            </div>
        </header>

        <main class="hero">
            <div class="hero-art" aria-hidden="true"></div>
            <div class="container hero-content">
                <span class="pill">
                    <span class="pill-dot"></span>
                    Now with instant settlement verification
                </span>
                <h1>Shared payments, <span>fully assured.</span></h1>
                <p>
                    The secure platform for splitting bills where trust is optional. Verify payments
                    in real-time and settle up without the awkward conversations.
                </p>
                <div class="hero-actions">
                    <a href="#" class="btn btn-primary">Start Splitting</a>
                    <a href="#" class="btn btn-secondary">View Demo</a>
                </div>
            </div>
        </main>
        <div class="section-divider"></div>
    </div>
</body>
</html>
